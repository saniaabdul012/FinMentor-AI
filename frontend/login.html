<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinMentor AI</title>

    <link rel="stylesheet" href="Auth.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-container">

    <div class="logo">
        <h1>💰 FinMentor AI</h1>
        <p>Your AI-powered financial mentor</p>
    </div>

    <div class="auth-card">

        <h2>Welcome Back 👋</h2>

        <p class="subtitle">
            Login to continue planning your financial future.
        </p>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="input-group">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button class="google-btn">
            Continue with Google
        </button>

        <p class="signup-text">
            Don't have an account?
            <a href="signup.html">Create Account</a>
        </p>

        <a href="index.html" class="back-home">
            ← Back to Home
        </a>

    </div>

</div>

<script src="Auth.js"></script>

</body>
</html>
